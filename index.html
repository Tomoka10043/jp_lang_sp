<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>日本語会話体験授業</title>

    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            font-family: sans-serif;
        }

        .slider-container {
            width: 95%;
            max-width: 800px;
            position: relative;
            overflow: hidden;
        }

        .slider {
            display: flex;
            transition: transform .5s ease;
        }

        .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .img-wrapper {
            position: relative;
            width: 100%;
        }

        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            background: rgba(253, 253, 253, 0.2); 
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 45px;
            height: 45px;
            border: none;
            border-radius: 50%;
            font-size: 26px;
            background: rgba(0,0,0,.5);
            color: white;
            cursor: pointer;
            z-index: 10;
        }

        .prev { left: 10px; }
        .next { right: 10px; }
        .nav:hover { background: rgba(0,0,0,.8); }

        .indicator {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #aaa;
        }

        .dot.active { background: white; }
    </style>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MK9B8TR3X3"></script>

</head>

    <button class="nav prev" id="navPrev">‹</button>
    <button class="nav next" id="navNext">›</button>

    <div class="slider" id="slider">

        <div class="slide">
            <div class="img-wrapper">
                <img src="./img/1.png" alt="Japanese group class">
                <a href="#" class="hotspot qr-link" data-qr="./img/qr_code_kakao.png"
                   style="top:59%; left:33%; width:24%; height:3%;"></a>
                <a href="https://www.instagram.com/japanese_study_room_0919" target="_blank"
                   class="hotspot"
                   style="top:63%; left:33%; width:18%; height:3.5%;"></a>
            </div>
        </div>

        <div class="slide">
            <div class="img-wrapper">
                <img src="./img/2.png" alt="Japanese one to one class">
                <a href="#" class="hotspot qr-link" data-qr="./img/qr_code_kakao.png"
                   style="top:60%; left:33%; width:25%; height:3%;"></a>
                <a href="https://www.instagram.com/japanese_study_room_0919" target="_blank"
                   class="hotspot"
                   style="top:63.5%; left:33%; width:18%; height:3.5%;"></a>
            </div>
        </div>

        <div class="slide">
            <div class="img-wrapper">
                <img src="./img/info_03.png" alt="Japanese language information">
            </div>
        </div>

        <div class="slide">
            <div class="img-wrapper">
                <img src="./img/info_04.png" alt="Japanese language information">
            </div>
        </div>

        <div class="slide">
            <div class="img-wrapper">
                <img src="./img/info_05.png" alt="Japanese language information">
            </div>
        </div>

    </div>

    <div class="indicator">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

</div>
