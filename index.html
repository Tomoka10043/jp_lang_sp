<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本語体験授業</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#333;
    font-family:sans-serif;
}

.image-wrapper{
    position:relative;
    display:inline-block;
    max-width:90%;
}

#wrapper-02{
    display:none;
}

.image-wrapper img{
    display:block;
    width:100%;
    height:auto;
    max-height:90vh;
    border-radius:8px;
}

.hotspot{
    position:absolute;
    cursor:pointer;
    background:rgba(255,0,0,0.2);
    border:1px solid red;
}

.blue{
    background:rgba(0,0,255,0.3);
    border:1px solid gold;
}

/* page1 */
.btn-to-page2{top:88%;left:50%;width:44%;height:4%;}
.link-kakao-01{top:69%;left:39%;width:16%;height:4%;}

/* page2 */
.btn-to-page1{top:77%;left:13%;width:37%;height:4%;}
.link-kakao-02{top:57%;left:50%;width:17%;height:4%;}
</style>

<!-- preload -->
<link rel="preload" as="image" href="japan_lang_group.png">
<link rel="preload" as="image" href="qrcode.png">

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>

</head>
<body>

<div class="image-wrapper" id="wrapper-01">
<img src="japan_lang_one.png" alt="個人授業案内">

<a class="hotspot btn-to-page2" id="btnNext"></a>
<a href="qrcode.png" target="_blank" class="qr-link hotspot blue link-kakao-01" id="qrLink1"></a>
</div>

<div class="image-wrapper" id="wrapper-02">
<img src="japan_lang_group.png" alt="グループ授業案内">

<a class="hotspot btn-to-page1" id="btnPrev"></a>
<a href="qrcode.png" target="_blank" class="qr-link hotspot blue link-kakao-02" id="qrLink2"></a>
</div>

<script>

const page1 = document.getElementById("wrapper-01")
const page2 = document.getElementById("wrapper-02")

const btnNext = document.getElementById("btnNext")
const btnPrev = document.getElementById("btnPrev")

/* ---------- ページ切替 ---------- */

function showPage(num){

    if(num===2){
        page1.style.display="none"
        page2.style.display="block"
    }else{
        page2.style.display="none"
        page1.style.display="block"
    }

    localStorage.setItem("currentPage",num)
}

btnNext.onclick=()=>showPage(2)
btnPrev.onclick=()=>showPage(1)

/* ---------- 初期ページ復元 ---------- */

function restorePage(){

    const saved=localStorage.getItem("currentPage")

    if(saved==="2"){
        showPage(2)
    }else{
        showPage(1)
    }
}

/* ---------- QR画像キャッシュ ---------- */

let qrImage=null
let qrProcessing=false

function preloadQR(){

    qrImage=new Image()
    qrImage.crossOrigin="anonymous"
    qrImage.src="qrcode.png"
}

async function readQR(target){

    if(qrProcessing) return
    qrProcessing=true

    try{

        const canvas=document.createElement("canvas")
        const ctx=canvas.getContext("2d",{alpha:false})

        canvas.width=qrImage.width
        canvas.height=qrImage.height

        ctx.drawImage(qrImage,0,0)

        const img=ctx.getImageData(0,0,canvas.width,canvas.height)

        const code=jsQR(img.data,canvas.width,canvas.height)

        if(code){

            let url=code.data

            if(url.includes("?")){
                url+="&id=qr_only_access"
            }else{
                url+="?id=qr_only_access"
            }

            qrProcessing=false
            window.location.href=url

        }else{

            alert("QRコード認識失敗")
            qrProcessing=false

        }

    }catch(err){

        alert("QR解析エラー")
        qrProcessing=false

    }

}

/* ---------- QRクリック ---------- */

function initQR(){

    const links=document.querySelectorAll(".qr-link")

    links.forEach(link=>{

        link.addEventListener("click",(e)=>{

            e.preventDefault()
            readQR()

        })

    })

}

/* ---------- 初期化 ---------- */

window.addEventListener("pageshow",()=>{

    restorePage()

})

document.addEventListener("DOMContentLoaded",()=>{

    preloadQR()
    initQR()
    restorePage()

})

</script>

<script type="module">

import { googleSheetAPI } from './logic.js'

const display=document.getElementById('view-count')

async function updateView(){

    const count=await googleSheetAPI.fetchViews()

    if(count!==null && display){

        display.textContent=count.toLocaleString()

        display.classList.remove('update-flash')
        void display.offsetWidth
        display.classList.add('update-flash')

    }

    setTimeout(updateView,10000)
}

updateView()

</script>

</body>
</html>
