    <script type="module">
        import { googleSheetAPI } from './logic.js';

        const display = document.getElementById('view-count');

        async function updateView() {
            const count = await googleSheetAPI.fetchViews();

            if (count !== null && display) {
                // 数値を更新

                // アニメーションを適用
